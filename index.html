<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCAMP · Ship Care and Maintenance · Algeciras</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* SCAMP brand — muestreado del logo del cliente (scampnetwork.com) */
  --brand-gold:#fdc500;
  --brand-gold-dark:#b98c00;
  --navy-950:#04222d;
  --navy-900:#073342;
  --navy-800:#0b4356;
  --blue-600:#00819e;
  --blue-500:#2ba3c0;
  --teal-600:#00819e;
  --teal-700:#045f76;
  --green-600:#1e8e5a;
  --green-100:#e3f6ec;
  --red-600:#c0392b;
  --red-100:#fce9e7;
  --amber-600:#c07a12;
  --amber-100:#fbf0dd;
  --ink-900:#101827;
  --ink-700:#374255;
  --ink-500:#64748b;
  --ink-300:#c7d0dc;
  --line:#e2e8f0;
  --bg:#eef2f6;
  --card:#ffffff;
  --radius:10px;
  --mono:'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --sans:'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:var(--sans);
  background:var(--bg);
  color:var(--ink-900);
  -webkit-font-smoothing:antialiased;
}
#app{display:flex;min-height:100vh;}

/* ---------- SIDEBAR ---------- */
.sidebar{
  width:236px;flex:0 0 236px;
  background:linear-gradient(180deg,var(--navy-950),var(--navy-900));
  color:#dce8f5;
  display:flex;flex-direction:column;
  position:sticky;top:0;height:100vh;
}
.brand{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.brand .mark{display:flex;align-items:center;gap:10px;}
.brand .mark svg{flex:0 0 30px;}
.brand h1{font-size:19px;font-weight:800;letter-spacing:.5px;margin:0;color:#fff;}
.brand p{margin:3px 0 0;font-size:11px;color:#8fa9c4;letter-spacing:.4px;}
.port-switch{display:flex;gap:6px;margin-top:14px;}
.port-pill{
  flex:1;text-align:center;padding:6px 4px;border-radius:7px;font-size:11.5px;font-weight:600;
  border:1px solid rgba(255,255,255,.14);color:#9fb7d0;cursor:pointer;letter-spacing:.2px;
}
.port-pill.active{background:var(--blue-600);color:#fff;border-color:var(--blue-600);}
nav.mainnav{padding:14px 12px;flex:1;}
.navitem{
  display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:8px;
  color:#a9c3d3;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:3px;
  border:1px solid transparent;border-left:3px solid transparent;position:relative;
}
.navitem .num{
  font-family:var(--mono);font-size:10.5px;color:#4f7a8c;width:16px;
}
.navitem:hover{background:rgba(255,255,255,.05);color:#fff;}
.navitem.active{background:rgba(0,129,158,.28);color:#fff;border-color:rgba(0,129,158,.4);border-left-color:var(--brand-gold);}
.navitem.active .num{color:var(--brand-gold);}
.sidebar-foot{padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:11px;color:#5f7c9c;}

/* ---------- MAIN ---------- */
main.content{flex:1;min-width:0;display:flex;flex-direction:column;}
.topbar{
  background:var(--card);border-bottom:1px solid var(--line);
  padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:5;
}
.topbar h2{margin:0;font-size:18px;font-weight:800;}
.topbar .eyebrow{font-family:var(--mono);font-size:10.5px;color:var(--blue-600);letter-spacing:.6px;font-weight:600;text-transform:uppercase;margin-bottom:2px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.clock{font-family:var(--mono);font-size:12px;color:var(--ink-500);}

.view{padding:24px 28px 60px;}

/* ---------- generic components ---------- */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);}
.btn{
  border:none;border-radius:7px;padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:var(--sans);display:inline-flex;align-items:center;gap:6px;
}
.btn-primary{background:var(--teal-600);color:#fff;}
.btn-primary:hover{background:var(--teal-700);}
.btn-blue{background:var(--blue-600);color:#fff;}
.btn-blue:hover{background:#2a629e;}
.btn-ghost{background:#fff;color:var(--ink-700);border:1px solid var(--line);}
.btn-ghost:hover{background:#f4f7fa;}
.btn-danger{background:var(--red-600);color:#fff;}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:6px;}
input[type=text],input[type=date],input[type=time],input[type=email],input[type=number],select,textarea{
  font-family:var(--sans);border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:13px;
  color:var(--ink-900);background:#fff;width:100%;
}
textarea{resize:vertical;}
label.field-label{font-size:11.5px;font-weight:700;color:var(--ink-500);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.badge{
  display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700;
  font-family:var(--mono);letter-spacing:.3px;
}
.b-cotizado{background:#eef2f7;color:#5c6b7d;}
.b-nominado{background:var(--amber-100);color:var(--amber-600);}
.b-operacion{background:#e4eefb;color:var(--blue-600);}
.b-salido{background:#eee6fb;color:#6b3fb8;}
.b-reporte{background:#e9f6fb;color:#127e8a;}
.b-facturado{background:var(--green-100);color:var(--green-600);}
.b-noaceptado{background:var(--red-100);color:var(--red-600);}
.b-cancelado{background:#f1f1f1;color:#7a7a7a;}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input,.toolbar select{width:auto;min-width:170px;}
.toolbar input{flex:1;min-width:220px;}

table.data{width:100%;border-collapse:collapse;font-size:13px;}
table.data thead th{
  text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-500);
  padding:10px 14px;border-bottom:1px solid var(--line);background:#f8fafc;font-weight:700;
}
table.data tbody td{padding:12px 14px;border-bottom:1px solid var(--line);}
table.data tbody tr{cursor:pointer;}
table.data tbody tr:hover{background:#f5f9fc;}
.mono{font-family:var(--mono);}
.muted{color:var(--ink-500);}
.small{font-size:12px;}

/* ---------- modal ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(9,20,32,.55);display:flex;align-items:flex-start;justify-content:center;
  padding:40px 16px;z-index:50;overflow-y:auto;
}
.modal{
  background:var(--card);border-radius:14px;max-width:1180px;width:100%;padding:26px 30px 34px;position:relative;
  box-shadow:0 30px 60px rgba(0,0,0,.3);
}
.modal-close{position:absolute;top:20px;right:20px;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:16px;color:var(--ink-700);}
.modal h3{margin:0;font-size:20px;font-weight:800;}
.modal .sub{color:var(--ink-500);font-size:12.5px;margin-top:4px;}
.section-title{font-size:15px;font-weight:800;margin:26px 0 12px;display:flex;align-items:center;gap:8px;}
.section-title .count{font-family:var(--mono);font-weight:500;font-size:11.5px;color:var(--ink-500);}

.flujo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.step{
  border:1px solid var(--line);border-radius:9px;padding:12px 13px;cursor:pointer;background:#fff;transition:.12s;
}
.step:hover{border-color:var(--blue-500);}
.step.done{background:var(--green-100);border-color:#b6e4c9;}
.step.rejected{background:var(--red-100);border-color:#f0bdb6;}
.step.active-sel{outline:2px solid var(--blue-500);outline-offset:1px;}
.step-top{display:flex;align-items:center;gap:9px;}
.check{
  width:19px;height:19px;border-radius:5px;border:1.5px solid var(--ink-300);flex:0 0 19px;
  display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;
}
.step.done .check{background:var(--green-600);border-color:var(--green-600);}
.step.rejected .check{background:var(--red-600);border-color:var(--red-600);}
.step-title{font-size:13px;font-weight:700;}
.step-desc{font-size:11.5px;color:var(--ink-500);margin-top:5px;line-height:1.4;}
.alarm-tag{display:inline-block;margin-top:6px;font-size:10.5px;font-weight:700;color:var(--red-600);font-family:var(--mono);}

.action-panel{margin-top:14px;background:#f8fafc;border:1px dashed var(--ink-300);border-radius:10px;padding:16px 18px;}
.action-panel h4{margin:0 0 12px;font-size:13.5px;}
.attach-chip{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);padding:5px 10px;border-radius:6px;font-size:12px;margin-bottom:10px;}

.composer{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:0 4px 14px rgba(15,35,50,.06);}
.composer-head{background:var(--navy-900);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:700;letter-spacing:.2px;}
.composer-head .dot{width:7px;height:7px;border-radius:50%;background:var(--brand-gold);display:inline-block;margin-right:8px;}
.composer-body{padding:14px 16px;}
.composer-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.composer-row label{width:60px;flex:0 0 60px;color:var(--ink-500);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
.composer-row input{border:none;padding:2px 0;flex:1;background:transparent;}
.composer-row input:focus{outline:none;}
.composer-body textarea{border:none;padding:12px 0 4px;width:100%;font-size:13px;resize:vertical;background:transparent;}
.composer-body textarea:focus{outline:none;}
.composer-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#f8fafc;border-top:1px solid var(--line);}
.sending-flash{display:inline-flex;align-items:center;gap:7px;color:var(--green-600);font-size:12.5px;font-weight:700;}

.doctabs{display:flex;gap:18px;border-bottom:1px solid var(--line);margin-bottom:12px;}
.doctab{padding:8px 2px;font-size:13px;font-weight:700;color:var(--ink-500);cursor:pointer;border-bottom:2px solid transparent;}
.doctab.active{color:var(--blue-600);border-color:var(--blue-600);}
.doclist{font-size:12.5px;color:var(--ink-500);margin-bottom:12px;}
.docrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--line);font-size:12.5px;}

.logrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px;}
.logrow .who{color:var(--ink-500);font-family:var(--mono);font-size:11px;}

.toast{
  position:fixed;bottom:22px;right:22px;background:var(--navy-900);color:#fff;padding:12px 18px;border-radius:9px;
  font-size:13px;font-weight:600;z-index:100;box-shadow:0 10px 24px rgba(0,0,0,.25);opacity:0;transform:translateY(8px);
  transition:.25s;
}
.toast.show{opacity:1;transform:translateY(0);}

/* entities */
.tabs-row{display:flex;gap:8px;margin-bottom:18px;}
.tabbtn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink-700);}
.tabbtn.active{background:var(--navy-900);color:#fff;border-color:var(--navy-900);}
.entity-layout{display:grid;grid-template-columns:270px 1fr;gap:18px;}
.entity-list{border-right:1px solid var(--line);}
.entity-row{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;font-size:13px;font-weight:600;}
.entity-row:hover{background:#f5f9fc;}
.entity-row.active{background:#e4eefb;color:var(--blue-600);}
.subtabs{display:flex;gap:16px;border-bottom:1px solid var(--line);margin-bottom:18px;}
.subtab{padding:9px 2px;font-size:12.5px;font-weight:700;color:var(--ink-500);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;letter-spacing:.3px;}
.subtab.active{color:var(--teal-700);border-color:var(--teal-700);}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.kpi{padding:18px 18px;}
.kpi .lbl{font-size:11px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
.kpi .val{font-size:26px;font-weight:800;margin-top:6px;font-family:var(--mono);}
.kpi .delta{font-size:12px;margin-top:4px;font-weight:700;}
.delta.up{color:var(--green-600);}
.delta.down{color:var(--red-600);}
.chart-card{padding:20px 22px;margin-bottom:20px;}
.chart-card h4{margin:0 0 2px;font-size:14.5px;}
.chart-card .cap{font-size:12px;color:var(--ink-500);margin-bottom:14px;}
.chart-row{display:grid;grid-template-columns:1.4fr 1fr;gap:18px;}

.aging-table td,.aging-table th{text-align:right;}
.aging-table td:first-child,.aging-table th:first-child{text-align:left;}

.empty{padding:40px;text-align:center;color:var(--ink-500);font-size:13px;}

/* ---------- stepper (Cotizaciones) ---------- */
.stepper{display:flex;align-items:center;margin-bottom:22px;}
.stepper-item{display:flex;flex-direction:column;align-items:center;gap:7px;flex:0 0 auto;}
.stepper-circle{
  width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:13px;border:2px solid var(--ink-300);color:var(--ink-500);background:#fff;
}
.stepper-item.done .stepper-circle{background:var(--green-600);border-color:var(--green-600);color:#fff;}
.stepper-item.current .stepper-circle{border-color:var(--brand-gold);color:var(--brand-gold-dark);box-shadow:0 0 0 3px rgba(253,197,0,.18);}
.stepper-label{font-size:11px;font-weight:700;color:var(--ink-500);text-align:center;text-transform:uppercase;letter-spacing:.3px;max-width:90px;}
.stepper-item.current .stepper-label{color:var(--ink-900);}
.stepper-line{flex:1;height:2px;background:var(--ink-300);margin:0 6px 22px;}
.stepper-line.done{background:var(--green-600);}

.field-auto{position:relative;}
.auto-flag{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:700;color:var(--blue-600);text-transform:uppercase;letter-spacing:.3px;margin-left:8px;}
.field-auto input,.field-auto select{border-color:#bfe3ec;background:#f4fbfd;}

/* ---------- mini-KPI row (Pizarra/Registro) ---------- */
.mini-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px;}
.mini-kpi{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.mini-kpi .lbl{font-size:11px;color:var(--ink-500);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}
.mini-kpi .val{font-size:24px;font-weight:800;font-family:var(--mono);margin-top:4px;}
.mini-kpi.alarm{border-color:#f0bdb6;}
.mini-kpi.alarm .val{color:var(--red-600);}
.alarm-row-tag{color:var(--red-600);margin-right:5px;}

/* ---------- next-step highlight (ficha de expediente) ---------- */
.step.next-step{border-color:var(--brand-gold);box-shadow:0 0 0 2px rgba(253,197,0,.25);}
.next-step-tag{position:absolute;top:-9px;right:8px;background:var(--brand-gold);color:var(--navy-950);font-family:var(--mono);font-size:9.5px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.3px;}
.step{position:relative;}

::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:#c6d2df;border-radius:8px;}
</style>
</head>

  <aside class="sidebar">
    <div class="brand">
      <div class="mark">

</div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>

function runOCR(){
  const text = document.getElementById('ocr-input').value;
  const shipM = text.match(/M\/V\s+([A-Z0-9 ]+?)(?:,|\.|\n)/i) || text.match(/(?:vessel|buque|barco)[:\s]+([A-Za-z0-9 ]+)/i);
  const imoM = text.match(/IMO\s*[:\-]?\s*(\d{7})/i);
  const etaM = text.match(/(\d{2})[-\/](\d{2})[-\/](\d{4})/) || text.match(/(\d{4})-(\d{2})-(\d{2})/);
  const loaM = text.match(/LOA\s*[:\-]?\s*(\d+(?:\.\d+)?)/i);
  const draftM = text.match(/Draft\s*[:\-]?\s*(\d+(?:\.\d+)?)/i);
  let clientId='';
  CLIENTES.forEach(c=>{ if(text.toLowerCase().includes(c.name.split(' ')[0].toLowerCase())) clientId=c.id; });
  let eta='';
  if(etaM){
    if(etaM[3] && etaM[3].length===4) eta = `${etaM[3]}-${etaM[2]}-${etaM[1]}`;
    else eta = `${etaM[1]}-${etaM[2]}-${etaM[3]}`;
  }
  const work=[];
  if(/hull/i.test(text)) work.push('Hull Cleaning');
  if(/propeller|hélice/i.test(text)) work.push('Propeller Polishing');
  if(/inspection|uwild/i.test(text)) work.push('Underwater Inspection (UWILD)');

  cotDraft = {
    ship: shipM ? shipM[1].trim() : cotDraft.ship,
    eta: eta || cotDraft.eta,
    imo: imoM ? imoM[1] : cotDraft.imo,
    work: work.length ? work : cotDraft.work,
    clientId: clientId || cotDraft.clientId,
    loa: loaM ? loaM[1] : cotDraft.loa,
    draft: draftM ? draftM[1] : cotDraft.draft,
  };
  renderView();
  toast('OCR analizado — revisa y completa los campos que falten');
}

/* ---------------- Generación real de PDF (jsPDF) ---------------- */
function descargarOfertaPDF(){
  if(!offerState) return;
  const c = clientById(cotDraft.clientId);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const marginL = 48;
  let y = 56;

  // Header — banda navy con marca SCAMP
  doc.setFillColor(4,34,45); // navy-950
  doc.rect(0,0,pageW,72,'F');
  doc.setFillColor(253,197,0); // brand-gold
  doc.rect(0,72,pageW,3,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('SCAMP', marginL, 34);
  doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  doc.text('Ship Care & Maintenance · Puerto de Algeciras (ESALG)', marginL, 52);
  doc.setFontSize(9); doc.setTextColor(220,232,245);
  doc.text(new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'}), pageW-marginL, 34, {align:'right'});

  y = 108;
  doc.setTextColor(16,24,39);
  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text('OFERTA DE SERVICIOS SUBACUÁTICOS', marginL, y);
  y += 22;

  doc.setDrawColor(226,232,240); doc.line(marginL, y, pageW-marginL, y); y += 20;

  const field = (label, value) => {
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(100,116,139);
    doc.text(label.toUpperCase(), marginL, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(16,24,39);
    doc.text(String(value||'—'), marginL + 110, y);
    y += 18;
  };
  field('Cliente', c ? c.name : '—');
  field('Buque', cotDraft.ship);
  field('IMO', cotDraft.imo);
  field('ETA', cotDraft.eta);
  field('LOA / Draft', `${cotDraft.loa||'—'} m / ${cotDraft.draft||'—'} m`);

  y += 8;
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(16,24,39);
  doc.text('Servicios cotizados', marginL, y); y += 14;
  doc.setDrawColor(226,232,240); doc.line(marginL, y-10, pageW-marginL, y-10);

  doc.setFont('helvetica','normal'); doc.setFontSize(10.5);
  const rates = c ? c.rates : [];
  cotDraft.work.forEach(w=>{
    const r = rates.find(r=>r.concepto.toLowerCase().includes(w.split(' ')[0].toLowerCase()));
    doc.setTextColor(16,24,39);
    doc.text(`•  ${w}`, marginL+6, y);
    doc.setTextColor(0,129,158);
    doc.text(r ? r.precio : 'A confirmar', pageW-marginL, y, {align:'right'});
    y += 18;
  });

  y += 10;

let boardFilters = {pizarra:{q:'',status:'',client:''}, registro:{q:'',status:'',client:''}};

function hasAlarm(e){
  return FLUJO_STEPS.some(s=>s.alarm && e.flujo[s.key] && !e.flujo[s.key].done);
}
function isUpcoming(e){
  const d = new Date(e.eta);
  if(isNaN(d)) return false;
  const diffDays = (d - new Date()) / 86400000;
  return diffDays >= 0 && diffDays <= 3;
}

function viewBoard(statuses, mode){
  const f = boardFilters[mode];
  const scopeRows = EXPEDIENTES.filter(e=>statuses.includes(e.status));
  const rows = scopeRows
    .filter(e=> !f.q || (e.ship.toLowerCase().includes(f.q.toLowerCase()) || e.id.toLowerCase().includes(f.q.toLowerCase()) || clientById(e.clientId).name.toLowerCase().includes(f.q.toLowerCase())))
    .filter(e=> !f.status || e.status===f.status)
    .filter(e=> !f.client || e.clientId===f.client);

  const showETBETS = mode==='pizarra';
  const nAlarm = scopeRows.filter(hasAlarm).length;
  const nUpcoming = scopeRows.filter(isUpcoming).length;
  return `
  <div class="mini-kpi-row">
    <div class="card mini-kpi"><div><div class="lbl">${mode==='pizarra'?'Servicios activos':'Expedientes'}</div><div class="val">${scopeRows.length}</div></div></div>
    <div class="card mini-kpi ${nAlarm?'alarm':''}"><div><div class="lbl">Con alarma</div><div class="val">${nAlarm}</div></div></div>
    <div class="card mini-kpi"><div><div class="lbl">Próximos ETA (72h)</div><div class="val">${nUpcoming}</div></div></div>
  </div>
  <div class="toolbar">
    <input type="text" id="bf-q-${mode}" placeholder="Buscar barco, cliente o JN..." value="${f.q}">
    <select id="bf-status-${mode}">
      <option value="">Todos los estados</option>
      ${statuses.map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <select id="bf-client-${mode}">
      <option value="">Todos los clientes</option>
      ${CLIENTES.map(c=>`<option value="${c.id}" ${f.client===c.id?'selected':''}>${c.name}</option>`).join('')}
    </select>
    <button class="btn btn-ghost" onclick="clearBoardFilters('${mode}')">Limpiar</button>
  </div>
  <div class="card" style="overflow-x:auto;">
    <table class="data">
      <thead><tr>
        <th>Expediente</th><th>Barco</th><th>Estado</th><th>ETA</th>
        ${showETBETS?'<th>ETB</th><th>ETS</th>':''}
        <th>Trabajo</th>${!showETBETS?'<th>Importe</th>':''}<th>Última acción</th>
      </tr></thead>
      <tbody>
        ${rows.length? rows.map(e=>`
          <tr onclick="openExp('${e.id}')">
            <td class="mono">${hasAlarm(e)?'<span class="alarm-row-tag" title="Gestión con alarma pendiente">⚠</span>':''}${e.id}</td>
            <td><b>${e.ship}</b><div class="muted small">${clientById(e.clientId).name}</div></td>
            <td><span class="badge ${badgeClass(e.status)}"><span class="pill-dot"></span>${e.status}</span></td>
            <td class="mono small">${e.eta}</td>
            ${showETBETS?`<td class="mono small">${e.etb}</td><td class="mono small">${e.ets}</td>`:''}
            <td class="small">${e.work}</td>
            ${!showETBETS?`<td class="mono small">${e.price?('€ '+e.price.toLocaleString('es-ES')):'—'}</td>`:''}
            <td class="small muted">${e.lastAction}<div class="mono" style="font-size:10.5px;">${e.lastActionDate}</div></td>
          </tr>`).join('') : `<tr><td colspan="8"><div class="empty">Sin expedientes que coincidan con el filtro.</div></td></tr>`}
      </tbody>
    </table>
  </div>`;
}
function wireBoardFilters(mode){
  const q=document.getElementById('bf-q-'+mode), st=document.getElementById('bf-status-'+mode), cl=document.getElementById('bf-client-'+mode);
  q.oninput=()=>{boardFilters[mode].q=q.value; patchBoard(mode);};
  st.onchange=()=>{boardFilters[mode].status=st.value; patchBoard(mode);};
  cl.onchange=()=>{boardFilters[mode].client=cl.value; patchBoard(mode);};
}
function patchBoard(mode){
  const statuses = mode==='pizarra'?PIZARRA_STATUSES:REGISTRO_STATUSES;
  document.getElementById('view-root').innerHTML = viewBoard(statuses, mode);
  wireBoardFilters(mode);
}
function clearBoardFilters(mode){ boardFilters[mode]={q:'',status:'',client:''}; patchBoard(mode); }

function renderStepCard(e, s, isNext){
  const st = e.flujo[s.key];
  const cls = st.rejected ? 'rejected' : (st.done ? 'done' : '');
  const sel = activeStepKey===s.key ? 'active-sel' : '';
  const nextCls = (isNext && !st.done) ? 'next-step' : '';
  let alarm='';
  if(s.alarm && !st.done) alarm = `<div class="alarm-tag">⚠ ALARMA · sin completar</div>`;
  return `
    <div class="step ${cls} ${sel} ${nextCls}" onclick="selectStep('${s.key}')">
      ${nextCls?'<div class="next-step-tag">SIGUIENTE PASO</div>':''}
      <div class="step-top">
        <div class="check">${st.done ? (st.rejected?'✕':'✓') : ''}</div>
        <div class="step-title">${s.title}</div>
      </div>
      <div class="step-desc">${s.desc}</div>
      ${alarm}
    </div>`;
}

function selectStep(key){
  activeStepKey = (activeStepKey===key) ? null : key;
  rerenderModalKeepScroll();
}

function defaultSubject(s,e){
  const map={
    prearrival_master:`Pre-Arrival Forms — M/V ${e.ship} — Algeciras`,
    mail_agencia:`Nomination SCAMP — M/V ${e.ship}`,
    rp_agente:`RP Request — M/V ${e.ship} — Algeciras`,
    notif_af:`Notification & Antifouling Cert. — M/V ${e.ship}`,
    arrival_instr:`Arrival Instructions — M/V ${e.ship} — Algeciras`,
  };
  return map[s.key] || `SCAMP — M/V ${e.ship}`;
}
function defaultTemplate(s,e,c){
  if(s.key==='prearrival_master') return `Dear Master,\n\nPlease find attached pre-arrival forms for the underwater service scheduled during your call at Algeciras (ETA ${e.eta}). Kindly complete and return.\n\nSCAMP Operations`;
  if(s.key==='mail_agencia') return `Dear Agency,\n\nPlease be informed SCAMP has been nominated for underwater services on M/V ${e.ship} (ETA ${e.eta}). RP to follow shortly.\n\nSCAMP Operations`;
  if(s.key==='rp_agente') return `Dear Agency,\n\nPlease find attached Request for Permission (RP) for M/V ${e.ship}. Kindly process with Port Authority.\n\nSCAMP Operations`;
  if(s.key==='notif_af') return `Dear Capitanía,\n\nNotification of underwater works on M/V ${e.ship} (${e.eta}). ${e.work.includes('Hull')?'Antifouling certificate attached as hull cleaning is included.':''}\n\nSCAMP Operations`;
  if(s.key==='arrival_instr') return `Dear Master,\n\nArrival instructions for the diving team ahead of works on M/V ${e.ship}. Please ensure gangway/pilot ladder access is available.\n\nSCAMP Operations`;
  return `Dear Sirs,\n\nPlease find the requested information regarding M/V ${e.ship}.\n\nSCAMP Operations`;
}
function estimateInvoice(e,c){
  const base = e.work.includes('Hull') ? 8200 : e.work.includes('Propeller') ? 1500 : 1950;
  return base;
}

/* ---- step actions ---- */
function curExp(){ return EXPEDIENTES.find(x=>x.id===modalExpId); }
function addLog(e,text){ e.log.push({text, who:'M. Ruiz', when: new Date().toISOString().slice(0,16).replace('T',' ')}); e.lastAction=text; e.lastActionDate=e.log[e.log.length-1].when; }
function refreshModal(){ rerenderModalKeepScroll(); renderView(); }

function rerenderModalKeepScroll(){
  const prevOverlay = document.querySelector('#modal-root .overlay');
  const prevScroll = prevOverlay ? prevOverlay.scrollTop : 0;
  document.getElementById('modal-root').innerHTML = renderModal();
  const newOverlay = document.querySelector('#modal-root .overlay');
  if(!newOverlay) return;
  if(activeStepKey){
    // a step panel is open — scroll it into view so it's never hidden off-screen
    const panel = document.getElementById('action-panel-holder');
    if(panel) panel.scrollIntoView({block:'center'});
  } else {
    newOverlay.scrollTop = prevScroll;
  }
}

function acceptOffer(accepted){
  const e=curExp();
  if(accepted){
    e.flujo.accept={done:true};
    e.status='Nominado';
    addLog(e,'Offer accepted by client');
    toast('Oferta aceptada — expediente pasa a Nominado');
    activeStepKey=null;
  } else {
    e.flujo.accept={done:true, rejected:true, motivo:''};
    e.status='No aceptado';
    addLog(e,'Offer rejected by client');
    toast('Oferta rechazada — expediente movido a Registro operativo');
  }
  refreshModal();
}
function saveRejectMotivo(){
  const e=curExp();
  e.flujo.accept.motivo = document.getElementById('reject-motivo').value;
  addLog(e,'Motivo de rechazo registrado');
  toast('Motivo guardado');
  refreshModal();
}
function doSend(key){
  const e=curExp();
  const to=document.getElementById('send-to').value;
  const subject=document.getElementById('send-subject')?document.getElementById('send-subject').value:'';
  if(!to){ toast('Añade un destinatario antes de enviar'); return; }
  const statusEl=document.getElementById('send-status-'+key);
  if(statusEl) statusEl.innerHTML = `<span class="sending-flash">Enviando…</span>`;
  setTimeout(()=>{
    e.flujo[key]={done:true};
    const step=FLUJO_STEPS.find(s=>s.key===key);
    addLog(e, `${step.title} sent to ${to}${subject?` — "${subject}"`:''}`);
    toast(`✉ ${step.title} enviado a ${to}`);
    activeStepKey=null;
    refreshModal();
  }, 550);
}
function doUpload(){
  const e=curExp();
  const files=document.getElementById('upload-file').files;
  const names = files.length ? Array.from(files).map(f=>f.name) : ['Prearrival_docs.pdf'];
  e.docs.servicios.push(...names);
  e.flujo.prearrival_recibido={done:true};
  addLog(e, `Prearrival recibido (${names.join(', ')})`);
  toast('Documentos subidos al repositorio del expediente');
  activeStepKey=null;
  refreshModal();
}
function doConfirm(key){
  const e=curExp();
  const box=document.getElementById('confirm-box');
  if(!box.checked){ toast('Marca la casilla de confirmación'); return; }
  e.flujo[key]={done:true};
  const step=FLUJO_STEPS.find(s=>s.key===key);
  addLog(e, `${step.title} confirmed`);
  toast(`${step.title} marcado como completado`);
  activeStepKey=null;
  refreshModal();
}
function doOps(key){
  const e=curExp();
  const time=document.getElementById('ops-time').value;
  e.flujo[key]={done:true, time};
  if(key==='commenced'){ e.status='En operación'; addLog(e, `Commenced ops at ${time} — client notified`); }
  if(key==='completed'){ e.status='Salido'; addLog(e, `Completed ops at ${time} — client notified`); }
  toast('Registrado y aviso enviado al cliente');
  activeStepKey=null;
  refreshModal();
}
function genReport(){
  const text=document.getElementById('report-ocr').value;
  const c=clientById(curExp().clientId);
  const report = `SCAMP · Diver Job Report\nBuque: ${curExp().ship}\nCliente: ${c.name}\n\nResumen: ${text}\n\n[Editable — el equipo de oficina puede completar detalles antes del envío final]`;
  document.getElementById('report-preview').innerHTML = `

}

  const e=curExp();
  e.docs.jobReports.push(`JR_${e.ship.replace(/\s+/g,'')}.pdf`);
  e.flujo.final_report={done:true};
  e.status='Reporte Efectuado';
  addLog(e,'Final report sent to client');

  activeStepKey=null;
  refreshModal();
}
function doInvoice(){

  const amount=parseFloat(document.getElementById('inv-amount').value)||0;
  e.flujo.factura={done:true};
  e.price=amount;
  e.status='Facturado';

/* ---- lightweight, dependency-free canvas charts (no CDN required) ---- */
function setupCanvas(id, cssHeight){
  const canvas = document.getElementById(id);
  const wrap = canvas.parentElement;
  const cssWidth = wrap.clientWidth;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cssWidth * dpr;
  canvas.height = cssHeight * dpr;
  canvas.style.width = cssWidth + 'px';
  canvas.style.height = cssHeight + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return {ctx, w: cssWidth, h: cssHeight};
}
function niceMax(v){ const p=Math.pow(10, Math.floor(Math.log10(v||1))); return Math.ceil(v/(p/2))*(p/2) || 10; }

function drawLineChart(id, labels, series){
  const {ctx, w, h} = setupCanvas(id, 190);
  const padL=34, padR=10, padT=14, padB=26;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const max = niceMax(Math.max(...series.flatMap(s=>s.data)));
  ctx.clearRect(0,0,w,h);
  ctx.font='10.5px ' + getComputedStyle(document.body).fontFamily;
  ctx.fillStyle='#94a3b8'; ctx.strokeStyle='#eef2f6'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y = padT + plotH - (plotH*i/4);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.fillText(Math.round(max*i/4), 2, y+3);
  }
  const stepX = plotW/(labels.length-1);
  labels.forEach((l,i)=>{ if(i%2===0) ctx.fillText(l, padL+stepX*i-8, h-8); });
  series.forEach(s=>{
    ctx.beginPath();
    s.data.forEach((v,i)=>{
      const x=padL+stepX*i, y=padT+plotH-(v/max*plotH);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.strokeStyle=s.color; ctx.lineWidth=2.2;
    if(s.dashed) ctx.setLineDash([5,4]); else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
    if(s.fill){
      ctx.lineTo(padL+stepX*(s.data.length-1), padT+plotH);
      ctx.lineTo(padL, padT+plotH);
      ctx.closePath();
      ctx.fillStyle = s.color+'22';
      ctx.fill();
    }
  });
  // legend
  let lx = padL;
  series.forEach(s=>{
    ctx.fillStyle=s.color; ctx.fillRect(lx, 2, 8, 8);
    ctx.fillStyle='#374255'; ctx.fillText(s.label, lx+11, 10);
    lx += ctx.measureText(s.label).width + 34;
  });
}
function drawBarChart(id, labels, data, color){
  const {ctx, w, h} = setupCanvas(id, 190);
  const padL=34, padR=10, padT=10, padB=26;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const max = niceMax(Math.max(...data));
  ctx.clearRect(0,0,w,h);
  ctx.font='10.5px ' + getComputedStyle(document.body).fontFamily;
  ctx.strokeStyle='#eef2f6';
  for(let i=0;i<=4;i++){
    const y = padT + plotH - (plotH*i/4);
    ctx.beginPath(); ctx.moveTo(padL,y); ctx.lineTo(w-padR,y); ctx.stroke();
    ctx.fillStyle='#94a3b8'; ctx.fillText(Math.round(max*i/4), 2, y+3);
  }
  const bw = plotW/data.length*0.55;
  data.forEach((v,i)=>{
    const cx = padL + plotW*(i+0.5)/data.length;
    const bh = v/max*plotH;
    ctx.fillStyle=color;
    roundRectTop(ctx, cx-bw/2, padT+plotH-bh, bw, bh, 5);
    ctx.fillStyle='#374255';
    ctx.fillText(labels[i], cx - ctx.measureText(labels[i]).width/2, h-8);
  });
}
function drawHBarChart(id, labels, data, color){
  const {ctx, w, h} = setupCanvas(id, Math.max(90, labels.length*30));
  const padL=64, padR=46, padT=8, padB=8;
  const plotW=w-padL-padR, plotH=h-padT-padB;
  const max = niceMax(Math.max(...data));
  ctx.clearRect(0,0,w,h);
  ctx.font='11px ' + getComputedStyle(document.body).fontFamily;
  const bh = plotH/data.length*0.55;
  data.forEach((v,i)=>{
    const cy = padT + plotH*(i+0.5)/data.length;
    const bw = v/max*plotW;
    ctx.fillStyle=color;
    roundRectRight(ctx, padL, cy-bh/2, bw, bh, 5);
    ctx.fillStyle='#374255';
    ctx.textAlign='right'; ctx.fillText(labels[i], padL-8, cy+4); ctx.textAlign='left';
    ctx.fillStyle='#64748b'; ctx.fillText('€ '+v.toLocaleString('es-ES'), padL+bw+6, cy+4);
  });
}
function roundRectTop(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x,y+h); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h);
  ctx.closePath(); ctx.fill();
}
function roundRectRight(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x,y+h);
  ctx.closePath(); ctx.fill();
}
